<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        input {
            padding: 10px;
            background: #222;
            border: none;
            color: white;
        }
        button {
            padding: 10px 20px;
            background-color: teal;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Enter Password</h2>
    <form method="POST">
        <input type="password" name="password" required>
        <button type="submit">Login</button>
    </form>
</body>
</html>
